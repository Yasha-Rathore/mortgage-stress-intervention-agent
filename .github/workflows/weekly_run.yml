name: Weekly Agent Run

on:
  schedule:
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scheduler
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY:  ${{ secrets.GROQ_API_KEY }}
          SENDGRID_KEY:  ${{ secrets.SENDGRID_KEY }}
          SENDGRID_FROM: ${{ secrets.SENDGRID_FROM }}
          YOUR_EMAIL:    ${{ secrets.YOUR_EMAIL }}
          VAPI_KEY:      ${{ secrets.VAPI_KEY }}
          VAPI_PHONE_ID: ${{ secrets.VAPI_PHONE_ID }}
          RAILWAY_URL:   ${{ secrets.RAILWAY_URL }}
          TEST_PHONE:    ${{ secrets.TEST_PHONE }}
        run: python scheduler.py
